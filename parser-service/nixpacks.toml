# pdf2image needs poppler for `pdftoppm`; nixpacks doesn't pull it in by
# default for python projects. Pin it here so Railway always builds with it.
[phases.setup]
nixPkgs = ['python311', 'poppler_utils']

[phases.install]
cmds = ['pip install --upgrade pip', 'pip install -r requirements.txt']

[start]
cmd = 'uvicorn app:app --host 0.0.0.0 --port $PORT'
